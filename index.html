// Editierbare thermische Standardwerte (global + Projekt-Override)
const UF_EPOCHS=["<1980","1980-1994","1995-2009",">=2010"];
const DEFAULT_TABLES={
  uf:{"Holz":{"<1980":2.0,"1980-1994":1.8,"1995-2009":1.6,">=2010":1.3},
      "Holz-Metall":{"<1980":2.2,"1980-1994":2.0,"1995-2009":1.7,">=2010":1.3},
      "Kunststoff":{"<1980":2.2,"1980-1994":2.0,"1995-2009":1.5,">=2010":1.2},
      "Kunststoff-Metall":{"<1980":2.4,"1980-1994":2.1,"1995-2009":1.6,">=2010":1.2},
      "Metall":{"<1980":5.0,"1980-1994":4.0,"1995-2009":2.6,">=2010":1.8},
      "Unbekannt":{"<1980":"","1980-1994":"","1995-2009":"",">=2010":""}},
  ug:{"2-fach IV":3.0,"2-fach WSV":1.3,"3-fach WSV":0.7,"Unbekannt":""},
  g:{"2-fach IV":0.76,"2-fach WSV":0.62,"3-fach WSV":0.50,"Unbekannt":""},
  psi:{"Aluminium":0.08,"Edelstahl (Warm Edge)":0.05,"Kunststoff (TGI/TPS)":0.04,"Unbekannt":""}
};
const TD_KEY="fc_thermalDefaults_v1";
let _gtd=null;
function loadGlobalTD(){if(_gtd)return _gtd;try{const s=localStorage.getItem(TD_KEY);_gtd=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_TABLES));}catch(e){_gtd=JSON.parse(JSON.stringify(DEFAULT_TABLES));}return _gtd;}
function saveGlobalTD(t){_gtd=t;try{localStorage.setItem(TD_KEY,JSON.stringify(t));}catch(e){}}
function effTD(p){return (p&&p.thermalDefaults)||loadGlobalTD()||DEFAULT_TABLES;}
const ufEpoch=y=>{const n=parseInt(y,10);if(!n)return null;return n<1980?"<1980":n<1995?"1980-1994":n<2010?"1995-2009":">=2010";};
function resolveDef(k,fen,vg,p){
  const T=effTD(p),flat=(p&&p.defaults&&p.defaults[k])||"";
  const sel=(rec,key)=>(rec&&rec.data&&rec.data[key])||(p&&p.defaults&&p.defaults[key])||"";
  let cond="";
  if(k==="ufWert"){const m=sel(fen,"rahmenMaterial"),ep=ufEpoch(sel(fen,"baujahr"));if(m&&m!=="Unbekannt"&&ep&&T.uf[m])cond=T.uf[m][ep];}
  else if(k==="ugWert"||k==="gWert"){const gt=sel(vg,"verglasungsTyp");if(gt&&gt!=="Unbekannt")cond=(k==="ugWert"?T.ug:T.g)[gt];}
  else if(k==="psiWert"){const rv=sel(vg,"randverbundTyp");if(rv&&rv!=="Unbekannt")cond=T.psi[rv];}
  return (cond===0||cond)&&cond!==""?String(cond):flat;
}
// Geometrie-Helfer (Zeilen-Modell: rows[{h,cols}], cells{"r:c":{art,band}})
const BAND_L={"":"","L":"Links","R":"Rechts","O":"Oben","U":"Unten"};
const newGeo=()=>({rows:[{h:3,cols:1}],cells:{}});
function normalizeGeo(g){
  if(!g)return newGeo();
  if(Array.isArray(g.rows))return g;
  if("fluegel" in g){const rows=[];if(g.oberlicht)rows.push({h:1,cols:1});rows.push({h:3,cols:g.fluegel||1});if(g.bruestung)rows.push({h:1,cols:1});
    const cells={},mi=g.oberlicht?1:0;for(let c=0;c<(g.fluegel||1);c++){const t=g.oeff&&g.oeff["main:"+c+":0:0"];if(t)cells[mi+":"+c]={art:t,band:""};}
    return {rows,cells};}
  return newGeo();
}
function pruneCells(rows,cells){const out={};Object.keys(cells||{}).forEach(k=>{const[r,c]=k.split(":").map(Number);if(rows[r]&&c<(rows[r].cols||1))out[k]=cells[k];});return out;}
function shiftCells(cells,delta){const out={};Object.keys(cells||{}).forEach(k=>{const[r,c]=k.split(":").map(Number);out[(r+delta)+":"+c]=cells[k];});return out;}
function dropRowCells(ri,cells){const out={};Object.keys(cells||{}).forEach(k=>{const[r,c]=k.split(":").map(Number);if(r===ri)return;out[(r>ri?r-1:r)+":"+c]=cells[k];});return out;}
function geoCellCount(g){g=normalizeGeo(g);return (g.rows||[]).reduce((s,r)=>s+(r.cols||1),0);}
function geoSummary(g){g=normalizeGeo(g);const rows=g.rows||[];if(!rows.length)return "";
  const parts=[rows.map(r=>(r.cols||1)+"-flg").join("/")];
  const ops=[];Object.keys(g.cells||{}).sort().forEach(k=>{const c=g.cells[k];if(c&&c.art)ops.push(c.art+(c.band?"("+c.band+")":""));});
  if(ops.length)parts.push("Öffnung: "+ops.join(", "));
  return parts.join("; ");}
function masseSummary(m){if(!m)return "";const ab={oben:"O",unten:"U",links:"L",rechts:"R",mittelV:"MV",mittelH:"MH"};return RM_POS.map(([k])=>{const v=m[k]||{};const i=v.i||"",a=v.a||"";return (i||a)?ab[k]+" "+(i||"-")+"/"+(a||"-"):"";}).filter(Boolean).join(" · ");}

// Fields that support project-level defaults
const DEFAULTABLE_FIELDS = [

  rahmenMaterial:{label:"Rahmenmaterial",g:"f",t:"select",o:FRAME_MAT},
  rahmenProfiltiefe:{label:"Rahmenprofiltiefe [mm]",g:"f",t:"number",src:true},
  baujahr:{label:"Baujahr",g:"f",t:"number",src:true},

  rahmenmasse:{label:"Rahmen-Abmessungen (Detail)",g:"f",t:"masse"},
  verglasungsTyp:{label:"Verglasungsaufbau",g:"v",t:"select",o:GLAZ_TYPES},
  scheibenaufbau:{label:"Scheibenaufbau [mm]",g:"v",t:"text",ph:"z.B. 4/16/4",hint:"Format: Glas/Zwischenraum/Glas in mm – z.B. 4/16/4 oder 4/12/4/12/4",src:true},
  glasDichtung:{label:"Verglasungsdichtung",g:"v",t:"select",o:VG_DICHT},
  lowE:{label:"Low-E Beschichtung",g:"v",t:"select",o:LOWE_OPT},
  gasart:{label:"Gasart",g:"v",t:"select",o:GAS_TYPES},
  randverbundTyp:{label:"Randverbund-Typ",g:"v",t:"select",o:RV_TYPES},
  randverbundZustand:{label:"Zustand Randverbund",g:"v",t:"select",o:RV_ZUST},
  psiWert:{label:"ψ-Wert Randverbund [W/mK]",g:"v",t:"number",step:"0.001",src:true},
  ugWert:{label:"Ug-Wert [W/m²K]",g:"v",t:"number",step:"0.01",src:true},
  gWert:{label:"g-Wert",g:"v",t:"number",step:"0.01",src:true},
  glasBreite:{label:"Glasbreite [mm]",g:"v",t:"number",src:true},
  glasHoehe:{label:"Glashöhe [mm]",g:"v",t:"number",src:true},
  glasBaujahr:{label:"Baujahr Verglasung",g:"v",t:"number",src:true},
  stempel:{label:"Stempel/Kennzeichnung",g:"v",t:"text",ph:"Herstellerangaben"},
};

const PRESETS={
  schnell:{name:"Schnell",desc:"Gasfüllgrad + Typ",fields:["verglasungsTyp"]},
  standard:{name:"Standard",desc:"Rahmen, Beschläge, Dichtungen",fields:["fassade","fensterTyp","rahmenMaterial","baujahr","dichtungAnzahl","dichtungZustand","beschlagZustand","verglasungsTyp","lowE","randverbundTyp","randverbundZustand","scheibenaufbau","glasDichtung","psiWert"]},
  voll:{name:"Voll",desc:"Alle Felder",fields:Object.keys(FIELDS)},
};

// IndexedDB
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,4);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:"id"});};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
async function dbAll(){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(STORE,"readonly");const s=t.objectStore(STORE).getAll();s.onsuccess=()=>r(s.result);s.onerror=()=>j(s.error);})}
async function dbPut(d){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(STORE,"readwrite");const s=t.objectStore(STORE).put(d);s.onsuccess=()=>r(s.result);s.onerror=()=>j(s.error);})}
async function dbDel(k){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction(STORE,"readwrite");const s=t.objectStore(STORE).delete(k);s.onsuccess=()=>r();s.onerror=()=>j(s.error);})}
function parseCSV(text){const ls=text.trim().split(/\r?\n/);if(ls.length<2)return[];const h=ls[0].split(/[;,\t]/).map(x=>x.trim().toLowerCase());return ls.slice(1).map(l=>{const v=l.split(/[;,\t]/).map(x=>x.trim());const o={};h.forEach((x,i)=>{o[x]=v[i]||"";});return o;}).filter(r=>Object.values(r).some(v=>v));}

// Export
function buildExport(p){
  const af=new Set(p.activeFields||[]);
  const ff=Object.entries(FIELDS).filter(([k,d])=>d.g==="f"&&d.t!=="zustand"&&d.t!=="geo"&&d.t!=="masse"&&af.has(k));
  const vf=Object.entries(FIELDS).filter(([k,d])=>d.g==="v"&&af.has(k));
  const geoOn=af.has("geometrie"),masseOn=af.has("rahmenmasse");
  const ov=[];
  ov.push(["FensterCheck – Projektexport"],[],["Projektname",p.name||""],["Gebäude",p.gebaeude||""],["Adresse",p.adresse||""],
    ["Begeher/in",p.begeher||""],["Begehungsdatum",p.begehungsdatum||""],["Witterung",p.witterung||""],
    ["Temp. aussen [°C]",p.tempAussen||""],["Temp. innen [°C]",p.tempInnen||""],
    ["Feuchte aussen [%rF]",p.feuchteAussen||""],["Feuchte innen [%rF]",p.feuchteInnen||""],
    ["Erstellt",p.erstellt?new Date(p.erstellt).toLocaleDateString("de-CH"):""],
    ["Geändert",p.geaendert?new Date(p.geaendert).toLocaleString("de-CH"):""],
    ["Modus",p.modus==="fenster"?"Fenster+Verglasungen":"Nur Verglasungen"],[]);
  let tR=0,tF=0,tV=0,tM=0,tP=0;
  (p.rooms||[]).forEach(r=>{tR++;tP+=(r.photos||[]).length;(r.fenster||[]).forEach(f=>{tF++;tP+=(f.photos||[]).length;(f.verglasungen||[]).forEach(v=>{tV++;tM+=(v.messungen||[]).length;tP+=(v.photos||[]).length;});});});
  ov.push(["Statistik"],["Räume",tR],["Fenster",tF],["Verglasungen",tV],["Messungen",tM],["Fotos",tP],[],
    ["Datenquellen"],["M","Messwert"],["H","Herstellerangabe"],["P","Planungsdaten"]);
  // Defaults
  if(p.defaults&&Object.keys(p.defaults).length>0){ov.push([],["Standardwerte"]);Object.entries(p.defaults).forEach(([k,v])=>{if(v&&FIELDS[k])ov.push([FIELDS[k].label,v]);});}

  const mh=["Geschoss","Raum-ID","Raumnummer","Fenster-Nr","Verglasung-Nr","Gasfüllgrad [%]","Messung-Nr","Zeitstempel","Datum","Uhrzeit"];
  vf.forEach(([k,d])=>{mh.push(d.label);if(d.src&&p.showSrc)mh.push(d.label+" [Quelle]");});
  ff.forEach(([k,d])=>{mh.push(d.label);if(d.src&&p.showSrc)mh.push(d.label+" [Quelle]");});
  if(p.zustandModus&&p.zustandModus!=="Keine")mh.push("Zustand Rahmen");
  if(geoOn)mh.push("Geometrie","Zeilen","Felder");
  if(masseOn)mh.push("Rahmenmaße i/a [mm]");
  mh.push("Notizen");
  const mr=[mh];
  (p.rooms||[]).forEach(room=>{(room.fenster||[]).forEach(fen=>{(fen.verglasungen||[]).forEach(vg=>{
    const ms=vg.messungen||[];
    const emit=(m,mi)=>{const z=m?new Date(m.zeit):null;
      const row=[room.geschoss||"",room.raumId||"",room.raumnummer||"",fen.nr||"",vg.nr||"",
        m?m.wert:"",m?mi+1:"",m?m.zeit:"",z?z.toLocaleDateString("de-CH"):"",z?z.toLocaleTimeString("de-CH"):""];
      vf.forEach(([k,d])=>{row.push(vg.data?.[k]||resolveDef(k,fen,vg,p));if(d.src&&p.showSrc)row.push(vg.sources?.[k]||"");});
      ff.forEach(([k,d])=>{row.push(fen.data?.[k]||resolveDef(k,fen,null,p));if(d.src&&p.showSrc)row.push(fen.sources?.[k]||"");});
      if(p.zustandModus&&p.zustandModus!=="Keine")row.push(fen.zustandRahmen||"");
      if(geoOn){const g=fen.geometrie;row.push(geoSummary(g),g?normalizeGeo(g).rows.length:"",g?geoCellCount(g):"");}
      if(masseOn)row.push(masseSummary(fen.rahmenmasse));
      row.push(vg.notizen||"");mr.push(row);};
    if(ms.length===0)emit(null,0);else ms.forEach((m,mi)=>emit(m,mi));
  });});});

  const zh=["Geschoss","Raum-ID","Raumnummer","Fenster","Verglasungen","Messungen","Ø [%]","Min [%]","Max [%]","Median [%]","Vollst. [%]","Fotos"];
  const zr=[zh];
  (p.rooms||[]).forEach(room=>{let fc=0,vc=0,mc=0,w=[],pc=(room.photos||[]).length;
    (room.fenster||[]).forEach(f=>{fc++;pc+=(f.photos||[]).length;(f.verglasungen||[]).forEach(v=>{vc++;pc+=(v.photos||[]).length;(v.messungen||[]).forEach(m=>{mc++;w.push(m.wert);});});});
    const s=[...w].sort((a,b)=>a-b);const avg=w.length?Math.round(w.reduce((a,b)=>a+b,0)/w.length*10)/10:"";
    const med=s.length?(s.length%2===0?Math.round((s[s.length/2-1]+s[s.length/2])/2*10)/10:s[Math.floor(s.length/2)]):"";
    zr.push([room.geschoss||"",room.raumId||"",room.raumnummer||"",fc,vc,mc,avg,s[0]??"",s[s.length-1]??"",med,vc>0?Math.round(Math.min(mc,vc)/vc*100):0,pc]);
  });

  const fh=["Nr","Ebene","Geschoss","Raumnummer","Fenster","Verglasung","Typ","Zeitstempel","Dateiname"];
  const fr=[fh];let fn=1;
  (p.rooms||[]).forEach(room=>{
    (room.photos||[]).forEach(ph=>{fr.push([fn++,"Raum",room.geschoss,room.raumnummer,"","","Raum",ph.zeit||"",`${room.geschoss}_${room.raumnummer}_Raum_${fn}.jpg`]);});
    (room.fenster||[]).forEach(fen=>{
      (fen.photos||[]).forEach(ph=>{fr.push([fn++,"Fenster",room.geschoss,room.raumnummer,fen.nr,"","Fenster",ph.zeit||"",`${room.geschoss}_${room.raumnummer}_${fen.nr}_${fn}.jpg`]);});
      (fen.verglasungen||[]).forEach(vg=>{(vg.photos||[]).forEach(ph=>{
        const t=ph.isStempel?"Stempel":"Verglasung";
        fr.push([fn++,"Verglasung",room.geschoss,room.raumnummer,fen.nr,vg.nr,t,ph.zeit||"",`${room.geschoss}_${room.raumnummer}_${fen.nr}_V${vg.nr}_${t}_${fn}.jpg`]);
      });});
    });
  });
  return{ov,mr,zr,fr};
}

function doExcelExport(p){const d=buildExport(p);const wb=XLSX.utils.book_new();
  const w1=XLSX.utils.aoa_to_sheet(d.ov);w1["!cols"]=[{wch:28},{wch:50}];XLSX.utils.book_append_sheet(wb,w1,"Übersicht");
  const w2=XLSX.utils.aoa_to_sheet(d.mr);w2["!cols"]=d.mr[0].map(h=>({wch:Math.max(10,Math.min(String(h).length+2,22))}));w2["!autofilter"]={ref:XLSX.utils.encode_range({s:{r:0,c:0},e:{r:0,c:d.mr[0].length-1}})};XLSX.utils.book_append_sheet(wb,w2,"Messungen");
  const w3=XLSX.utils.aoa_to_sheet(d.zr);w3["!cols"]=d.zr[0].map(h=>({wch:Math.max(10,Math.min(String(h).length+2,20))}));w3["!autofilter"]={ref:XLSX.utils.encode_range({s:{r:0,c:0},e:{r:0,c:d.zr[0].length-1}})};XLSX.utils.book_append_sheet(wb,w3,"Zusammenfassung");
  if(d.fr.length>1){const w4=XLSX.utils.aoa_to_sheet(d.fr);XLSX.utils.book_append_sheet(wb,w4,"Fotoverzeichnis");}
  XLSX.writeFile(wb,`FensterCheck_${p.name||"Export"}_${new Date().toISOString().slice(0,10)}.xlsx`);}
function doCSVExport(p){const d=buildExport(p);const csv=d.mr.map(r=>r.map(c=>{const s=String(c??"");return s.includes(";")||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;}).join(";")).join("\n");const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`FensterCheck_${p.name||"Export"}_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(u);}
function stripPhotos(p){const c=JSON.parse(JSON.stringify(p));(c.rooms||[]).forEach(r=>{r.photos=[];(r.fenster||[]).forEach(f=>{f.photos=[];(f.verglasungen||[]).forEach(v=>{v.photos=[];});});});return c;}
function doJSONExport(p,withoutPhotos){const data=withoutPhotos?stripPhotos(p):p;const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`FensterCheck_${p.name||"Backup"}${withoutPhotos?"_Daten":""}_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);}
async function doPhotoExport(p){let n=0;const dl=async(data,name)=>{const a=document.createElement("a");a.href=data;a.download=name;a.click();n++;await new Promise(r=>setTimeout(r,250));};
  for(const rm of(p.rooms||[])){for(const ph of(rm.photos||[]))await dl(ph.data,`${rm.geschoss}_${rm.raumnummer}_Raum_${ph.id.slice(-4)}.jpg`);

// DIN-Öffnungssymbol je Feld (Dreieck-Spitze zur Bandseite)
function openingSymbol(cell,x,y,w,h,key){
  const a=cell.art||"",band=cell.band||"",col=C.ac,sw=1.2,m=4,els=[];const cx=x+w/2,cy=y+h/2;
  const L=(x1,y1,x2,y2,i)=><line key={key+"_"+i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={col} strokeWidth={sw} style={{pointerEvents:"none"}}/>;
  const drehL=()=>[L(x+w-m,y+m,x+m,cy,1),L(x+w-m,y+h-m,x+m,cy,2)];
  const drehR=()=>[L(x+m,y+m,x+w-m,cy,1),L(x+m,y+h-m,x+w-m,cy,2)];
  const kipp=()=>[L(x+m,y+m,cx,y+h-m,3),L(x+w-m,y+m,cx,y+h-m,4)];
  const klapp=()=>[L(x+m,y+h-m,cx,y+m,5),L(x+w-m,y+h-m,cx,y+m,6)];
  if(a==="Dreh"||a==="Dreh-Kipp")els.push(...(band==="R"?drehR():drehL()));
  if(a==="Kipp"||a==="Dreh-Kipp")els.push(...kipp());
  if(a==="Klapp")els.push(...klapp());
  if(a==="Schiebe")els.push(L(x+m,cy,x+w-m,cy,7),L(x+w-m,cy,x+w-m-5,cy-3,8),L(x+w-m,cy,x+w-m-5,cy+3,9));
  return els;
}

// Fenstergeometrie – Zeilen-Modell, Feld antippen → auswählen
function GeoEditor({geo,onChange}){
  const g=normalizeGeo(geo);
  const[sel,setSel]=useState(null);
  const rows=g.rows;
  const setCols=(ri,cols)=>{const nr=rows.map((r,i)=>i===ri?{...r,cols}:r);onChange({...g,rows:nr,cells:pruneCells(nr,g.cells)});};
  const setH=(ri,dh)=>onChange({...g,rows:rows.map((r,i)=>i===ri?{...r,h:Math.max(1,(r.h||1)+dh)}:r)});
  const addRow=top=>onChange({...g,rows:top?[{h:1,cols:1},...rows]:[...rows,{h:1,cols:1}],cells:top?shiftCells(g.cells,1):g.cells});
  const delRow=ri=>{if(rows.length<=1)return;onChange({...g,rows:rows.filter((_,i)=>i!==ri),cells:dropRowCells(ri,g.cells)});setSel(null);};
  const setCell=(key,patch)=>onChange({...g,cells:{...g.cells,[key]:{art:"",band:"",...(g.cells[key]||{}),...patch}}});
  const VW=300,PAD=8,MULL=2,BAR=1.4;
  const totalH=rows.reduce((s,r)=>s+(r.h||1),0)||1,AREA_H=Math.max(120,rows.length*46);
  const innerW=VW-2*PAD,x0=PAD,VH=AREA_H+2*PAD;
  const rects=[],syms=[];let yy=PAD;
  rows.forEach((row,ri)=>{const rh=(row.h||1)/totalH*AREA_H,cols=row.cols||1,cw=(innerW-(cols-1)*MULL)/cols;
    for(let c=0;c<cols;c++){const x=x0+c*(cw+MULL),y=yy,key=ri+":"+c,cell=g.cells[key]||{},isSel=sel===key;
      rects.push(<rect key={"r"+key} x={x} y={y} width={cw} height={rh} fill={cell.art?C.acBg:C.sf2} stroke={isSel?C.ac:C.bd} strokeWidth={isSel?2.5:BAR} onClick={()=>setSel(key)} style={{cursor:"pointer"}}/>);
      syms.push(...openingSymbol(cell,x,y,cw,rh,key));
      if(cell.art)syms.push(<text key={"t"+key} x={x+3} y={y+11} fill={C.tx2} fontSize="9" style={{pointerEvents:"none"}}>{FEN_AB[cell.art]||""}{cell.band?"·"+cell.band:""}</text>);
    }yy+=rh;});
  const seg=(val,arr,on)=><div style={{display:"flex",gap:2}}>{arr.map(n=><button key={n} style={{...$.btn,...$.bS,padding:"3px 7px",fontSize:11,...(val===n?$.bP:$.bO)}} onClick={()=>on(n)}>{n}</button>)}</div>;
  const sb={...$.btn,...$.bO,padding:"2px 8px",fontSize:13,minWidth:26};
  return <div>
    <div style={{...$.lbl,marginBottom:4}}>Zeilen (oben → unten)</div>
    {rows.map((row,ri)=><div key={ri} style={{display:"flex",alignItems:"center",gap:4,marginBottom:4,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:C.tx2,width:22}}>Z{ri+1}</span>
      <span style={{fontSize:10,color:C.tx3}}>Flg</span>{seg(row.cols||1,[1,2,3,4],n=>setCols(ri,n))}
      <span style={{fontSize:10,color:C.tx3,marginLeft:4}}>Höhe</span>
      <button style={sb} onClick={()=>setH(ri,-1)}>−</button><span style={{fontSize:12,minWidth:14,textAlign:"center"}}>{row.h||1}</span><button style={sb} onClick={()=>setH(ri,1)}>+</button>
      {rows.length>1&&<button style={{...sb,color:C.err,borderColor:C.err+"60"}} onClick={()=>delRow(ri)}>🗑</button>}
    </div>)}
    <div style={{display:"flex",gap:6,marginTop:2,marginBottom:6}}>
      <button style={{...$.btn,...$.bO,...$.bS,flex:1}} onClick={()=>addRow(true)}>↑ Zeile oben</button>
      <button style={{...$.btn,...$.bO,...$.bS,flex:1}} onClick={()=>addRow(false)}>↓ Zeile unten</button>
    </div>
    <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" style={{height:"auto",display:"block",touchAction:"manipulation",marginBottom:6}}>{rects}{syms}<rect x={3} y={3} width={VW-6} height={VH-6} fill="none" stroke={C.tx2} strokeWidth={4} rx={4}/></svg>
    {sel!=null?(()=>{const pr=sel.split(":"),cell=g.cells[sel]||{},showBand=cell.art==="Dreh"||cell.art==="Dreh-Kipp";
      return <div style={{padding:8,background:C.sf2,borderRadius:8,marginBottom:6}}>
        <div style={{fontSize:11,color:C.tx2,marginBottom:5}}>Feld Z{+pr[0]+1} · Spalte {+pr[1]+1}</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:showBand?6:0}}>{["",...FEN_TYPEN].map(t=><button key={t||"x"} style={{...$.btn,...$.bS,padding:"4px 7px",fontSize:11,...((cell.art||"")===t?$.bP:$.bO)}} onClick={()=>setCell(sel,{art:t})}>{t||"leer"}</button>)}</div>
        {showBand&&<div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:11,color:C.tx2}}>Bandseite (Anschlag):</span>{[["L","Links"],["R","Rechts"]].map(([v,l])=><button key={v} style={{...$.btn,...$.bS,padding:"4px 9px",...(cell.band===v?$.bP:$.bO)}} onClick={()=>setCell(sel,{band:v})}>{l}</button>)}</div>}
      </div>;})()
    :<div style={{fontSize:10,color:C.tx3,marginBottom:6}}>Feld antippen → Öffnungsart &amp; Bandseite wählen</div>}
    <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:10,color:C.tx2}}>{FEN_TYPEN.map(t=><span key={t}><b style={{color:C.tx}}>{FEN_AB[t]}</b> {t}</span>)}</div>
  </div>;
}

    <div style={{overflowX:"auto"}}><div style={{minWidth:340}}>
      <div style={{display:"grid",gridTemplateColumns:"96px repeat(4,1fr)",gap:4,marginBottom:3}}><span></span>{UF_EPOCHS.map(e=><span key={e} style={{fontSize:10,color:C.tx2,textAlign:"center"}}>{e}</span>)}</div>
      {FRAME_MAT.filter(mm=>mm!=="Unbekannt").map(mm=><div key={mm} style={{display:"grid",gridTemplateColumns:"96px repeat(4,1fr)",gap:4,alignItems:"center",marginBottom:3}}>
        <span style={{fontSize:11,color:C.tx2}}>{mm}</span>
        {UF_EPOCHS.map(e=><div key={e}>{numIn(T.uf?.[mm]?.[e],v=>setCell("uf",mm,e,v),"0.01")}</div>)}
      </div>)}
    </div></div>
    <div style={{fontSize:11,fontWeight:700,color:C.ac,margin:"10px 0 4px"}}>Ug – Glas [W/m²K]</div>{list("ug",GLAZ_TYPES.filter(t=>t!=="Unbekannt"),"0.01")}
    <div style={{fontSize:11,fontWeight:700,color:C.ac,margin:"10px 0 4px"}}>g-Wert</div>{list("g",GLAZ_TYPES.filter(t=>t!=="Unbekannt"),"0.01")}
    <div style={{fontSize:11,fontWeight:700,color:C.ac,margin:"10px 0 4px"}}>ψ – Randverbund [W/mK]</div>{list("psi",RV_TYPES.filter(t=>t!=="Unbekannt"),"0.001")}
  </div>;
}

// Main App
function App(){
  const[projects,setProjects]=useState([]);
  const[proj,setProj]=useState(null);
  const[view,setView]=useState("home");
  const[room,setRoom]=useState(null);
  const[fen,setFen]=useState(null);
  const[vg,setVg]=useState(null);
  const[numVal,setNumVal]=useState("");
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const[fmR,setFmR]=useState({geschoss:"EG",raumnummer:"",raumId:""});
  const[fmF,setFmF]=useState({nr:"",va:2});
  const[impTxt,setImpTxt]=useState("");
  const[loading,setLoading]=useState(true);
  const[collapsed,setCollapsed]=useState({}); // floor collapse state
  const[customQty,setCustomQty]=useState("");
  const[confirmNav,setConfirmNav]=useState(null); // {action: fn}
  const[hasUnsaved,setHasUnsaved]=useState(false); // track unsaved numpad input
  const[showGas,setShowGas]=useState(false); // optionalen Gasfüllgrad-Numpad ein-/ausklappen
  const[globalTD,setGlobalTD]=useState(loadGlobalTD()); // globale thermische Standardwerte

  useEffect(()=>{dbAll().then(d=>{setProjects(d||[]);setLoading(false);}).catch(()=>setLoading(false));},[]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2500);};

  // Track unsaved state
  useEffect(()=>{setHasUnsaved(numVal.length>0);},[numVal]);

  const guardNav=(action)=>{
    if(hasUnsaved){setConfirmNav({action});}
    else action();
  };

  const save=async p=>{p.geaendert=new Date().toISOString();await dbPut(p);setProjects(pv=>{const i=pv.findIndex(x=>x.id===p.id);if(i>=0){const n=[...pv];n[i]=p;return n;}return[...pv,p];});setProj({...p});};
  const gR=(p,id)=>p.rooms.find(r=>r.id===id);
  const gF=(r,id)=>r?.fenster?.find(f=>f.id===id);
  const gV=(f,id)=>f?.verglasungen?.find(v=>v.id===id);
  const mut=fn=>{const p=JSON.parse(JSON.stringify(proj));fn(p);save(p);};

  const hasData=p=>{let n=0;(p?.rooms||[]).forEach(r=>(r.fenster||[]).forEach(f=>(f.verglasungen||[]).forEach(v=>{n+=(v.messungen||[]).length;})));return n>0;};

  const createProj=()=>{const p={id:uid(),name:"",gebaeude:"",adresse:"",erstellt:new Date().toISOString(),geaendert:new Date().toISOString(),modus:"fenster",zustandModus:"Keine",activeFields:[...PRESETS.standard.fields],defaults:{},rooms:[]};setProj(p);setView("setup");};
  const delProj=async id=>{await dbDel(id);setProjects(p=>p.filter(x=>x.id!==id));if(proj?.id===id){setProj(null);setView("home");}};
  const impRooms=()=>{if(!impTxt.trim())return;const d=parseCSV(impTxt);if(!d.length){flash("Keine Daten");return;}
    const hasPerWindow=d.some(r=>r.fenster_nr||r.fensternr||r.window_nr);
    mut(p=>{
      if(hasPerWindow){
        const groups=new Map();
        d.forEach(r=>{
          const geschoss=r.geschoss||r.floor||"";
          const raumnummer=r.raumnummer||r.room||"";
          const raumId=r.raumid||r.raum_id||r.id||"";
          if(!raumnummer&&!raumId)return;
          const key=`${geschoss}||${raumnummer}||${raumId}`;
          if(!groups.has(key))groups.set(key,{geschoss,raumnummer,raumId,windows:[]});
          const fnr=r.fenster_nr||r.fensternr||r.window_nr||"";
          const nVg=parseInt(r.verglasungen||r.anzahl_verglasungen||r.glazings||"1")||1;
          groups.get(key).windows.push({nr:fnr,nVg});
        });
        groups.forEach(g=>{
          const rm={id:uid(),geschoss:g.geschoss,raumnummer:g.raumnummer,raumId:g.raumId,fenster:[],photos:[]};
          g.windows.forEach((w,wi)=>{
            const nr=w.nr||`F${wi+1}`;
            if(p.modus==="fenster"){
              rm.fenster.push({id:uid(),nr,
                verglasungen:Array.from({length:w.nVg},(_,vi)=>({id:uid(),nr:vi+1,messungen:[],data:{},sources:{},photos:[],notizen:""})),
                data:{},sources:{},photos:[],notizen:""});
            } else {
              for(let vi=0;vi<w.nVg;vi++){
                rm.fenster.push({id:uid(),nr:`V${rm.fenster.length+1}`,isVg:1,
                  verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],
                  data:{},sources:{},photos:[],notizen:""});
              }
            }
          });
          p.rooms.push(rm);
        });
      } else {
        const newRooms=d.map(r=>{
          const geschoss=r.geschoss||r.floor||"";
          const raumnummer=r.raumnummer||r.room||"";
          const raumId=r.raumid||r.raum_id||r.id||"";
          if(!raumnummer&&!raumId)return null;
          const rm={id:uid(),geschoss,raumnummer,raumId,fenster:[],photos:[]};
          const nFen=parseInt(r.fenster||r.anzahl_fenster||r.windows||"0")||0;
          const nVgJeFen=parseInt(r.verglasungen_je_fenster||r.vg_je_fenster||r.glazings_per_window||"0")||0;
          const nVgTotal=parseInt(r.verglasungen||r.anzahl_verglasungen||r.glazings||"0")||0;
          if(p.modus==="fenster"&&nFen>0){
            const vgPer=nVgJeFen||1;
            for(let fi=0;fi<nFen;fi++){
              rm.fenster.push({id:uid(),nr:`F${fi+1}`,
                verglasungen:Array.from({length:vgPer},(_,vi)=>({id:uid(),nr:vi+1,messungen:[],data:{},sources:{},photos:[],notizen:""})),
                data:{},sources:{},photos:[],notizen:""});
            }
          } else if(nVgTotal>0){
            for(let vi=0;vi<nVgTotal;vi++){
              rm.fenster.push({id:uid(),nr:`V${vi+1}`,isVg:1,
                verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],
                data:{},sources:{},photos:[],notizen:""});
            }
          } else if(nFen>0&&p.modus==="verglasung"){
            const total=nFen*(nVgJeFen||1);
            for(let vi=0;vi<total;vi++){
              rm.fenster.push({id:uid(),nr:`V${vi+1}`,isVg:1,
                verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],
                data:{},sources:{},photos:[],notizen:""});
            }
          }
          return rm;
        }).filter(Boolean);
        p.rooms=[...p.rooms,...newRooms];
      }
    });
    const parsed=parseCSV(impTxt);
    const hasWin=parsed.some(r=>r.fenster_nr||r.fensternr||r.window_nr);
    const nR=hasWin?new Set(parsed.map(r=>`${r.geschoss||""}|${r.raumnummer||r.room||""}`)).size:parsed.filter(r=>r.raumnummer||r.raumid||r.raum_id||r.id||r.room).length;
    setImpTxt("");flash(`${nR} Räume importiert`);};
  const impJSON=(t,merge)=>{try{const d=JSON.parse(t);if(!d.id||!d.rooms){flash("Ungültig");return;}if(merge&&proj){mut(p=>{const ids=new Set(p.rooms.map(r=>r.id));const added=d.rooms.filter(r=>!ids.has(r.id));p.rooms=[...p.rooms,...added];});flash("Zusammengeführt");}else{d.id=uid();d.geaendert=new Date().toISOString();save(d);setProjects(pv=>[...pv,d]);setProj(d);setView("survey");flash(`Projekt «${d.name||"Import"}» importiert`);}}catch{flash("Fehler: ungültige JSON-Datei");}};

  const addRoom=()=>{if(!fmR.raumnummer&&!fmR.raumId)return;mut(p=>{p.rooms.push({id:uid(),...fmR,fenster:[],photos:[]});});setFmR({geschoss:fmR.geschoss,raumnummer:"",raumId:""});setModal(null);flash("Raum +");};
  const delRoom=rId=>{mut(p=>{p.rooms=p.rooms.filter(r=>r.id!==rId);});if(room?.id===rId){setRoom(null);setView("survey");}};

  const addFen=(rId,nr,va)=>{mut(p=>{const r=gR(p,rId);if(!r)return;if(p.modus==="fenster"){r.fenster.push({id:uid(),nr:nr||`F${(r.fenster.length||0)+1}`,verglasungen:Array.from({length:va||1},(_,i)=>({id:uid(),nr:i+1,messungen:[],data:{},sources:{},photos:[],notizen:""})),data:{},sources:{},photos:[],notizen:""});}else{r.fenster.push({id:uid(),nr:`V${(r.fenster.length||0)+1}`,isVg:1,verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],data:{},sources:{},photos:[],notizen:""});}});};
  const quickAdd=(rId,n)=>{mut(p=>{const r=gR(p,rId);if(!r)return;const s=(r.fenster.length||0)+1;for(let i=0;i<n;i++)r.fenster.push({id:uid(),nr:`V${s+i}`,isVg:1,verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],data:{},sources:{},photos:[],notizen:""});});flash(`+${n}`);};

  // Delete Verglasung (in Vg mode = delete fenster entry, in Fen mode = remove from verglasungen array)
  const delVg=(rId,fId,vId)=>{mut(p=>{const r=gR(p,rId);if(!r)return;
    const f=gF(r,fId);if(!f)return;
    if(f.isVg||f.verglasungen.length<=1){r.fenster=r.fenster.filter(x=>x.id!==fId);} // remove whole pseudo-fenster or last vg
    else{f.verglasungen=f.verglasungen.filter(v=>v.id!==vId);f.verglasungen.forEach((v,i)=>{v.nr=i+1;});} // re-number
  });};

  // Add extra Verglasung to current room (from measure view)
  const addExtraVg=(rId)=>{mut(p=>{const r=gR(p,rId);if(!r)return;
    if(p.modus==="verglasung"){const s=(r.fenster.length||0)+1;r.fenster.push({id:uid(),nr:`V${s}`,isVg:1,verglasungen:[{id:uid(),nr:1,messungen:[],data:{},sources:{},photos:[],notizen:""}],data:{},sources:{},photos:[],notizen:""});}
    else{/* In Fenster mode, add vg to current fenster - handled differently */}
  });};

  const addMs=(rId,fId,vId,val)=>{mut(p=>{const v=gV(gF(gR(p,rId),fId),vId);if(v)v.messungen.push({wert:parseFloat(val),zeit:new Date().toISOString()});});flash(`${val}%`);};
  const delMs=(rId,fId,vId,mi)=>{mut(p=>{const v=gV(gF(gR(p,rId),fId),vId);if(v)v.messungen.splice(mi,1);});};
  const setFV=(rId,fId,vId,k,val)=>{mut(p=>{const t=vId?gV(gF(gR(p,rId),fId),vId):gF(gR(p,rId),fId);if(t){if(!t.data)t.data={};t.data[k]=val;}});};
  const setFS=(rId,fId,vId,k,s)=>{mut(p=>{const t=vId?gV(gF(gR(p,rId),fId),vId):gF(gR(p,rId),fId);if(t){if(!t.sources)t.sources={};t.sources[k]=s;}});};
  const setZu=(rId,fId,v)=>{mut(p=>{const f=gF(gR(p,rId),fId);if(f)f.zustandRahmen=v;});};
  const setGeo=(rId,fId,g)=>{mut(p=>{const f=gF(gR(p,rId),fId);if(f)f.geometrie=g;});};
  const setMasse=(rId,fId,m)=>{mut(p=>{const f=gF(gR(p,rId),fId);if(f)f.rahmenmasse=m;});};
  const addPh=(rId,fId,vId,ph)=>{mut(p=>{let t;if(vId)t=gV(gF(gR(p,rId),fId),vId);else if(fId)t=gF(gR(p,rId),fId);else t=gR(p,rId);if(t){if(!t.photos)t.photos=[];t.photos.push(ph);}});};
  const delPh=(rId,fId,vId,pId)=>{mut(p=>{let t;if(vId)t=gV(gF(gR(p,rId),fId),vId);else if(fId)t=gF(gR(p,rId),fId);else t=gR(p,rId);if(t)t.photos=(t.photos||[]).filter(x=>x.id!==pId);});};

  const pSt=p=>{let g=0,m=0,ph=0,pb=0;const aP=arr=>(arr||[]).forEach(x=>{ph++;pb+=(x.data||"").length;});(p?.rooms||[]).forEach(r=>{aP(r.photos);(r.fenster||[]).forEach(f=>{aP(f.photos);(f.verglasungen||[]).forEach(v=>{g++;m+=(v.messungen||[]).length;aP(v.photos);});});});return{rooms:(p?.rooms||[]).length,g,m,ph,mb:pb/1048576};};
  // Eine Verglasung gilt als "erfasst", wenn sie (oder ihr Fenster) dokumentiert ist – Messung, Foto, Daten oder Zustand. Nicht mehr nur an der Gasfüllgrad-Messung festgemacht.
  const vgErf=(f,v)=>(v?.messungen?.length>0)||((v?.photos||[]).length>0)||Object.values(v?.data||{}).some(x=>x&&(""+x).trim())||((f?.photos||[]).length>0)||Object.values(f?.data||{}).some(x=>x&&(""+x).trim())||!!f?.zustandRahmen;
  const rSt=r=>{let g=0,m=0,e=0;(r?.fenster||[]).forEach(f=>(f.verglasungen||[]).forEach(v=>{g++;m+=(v.messungen||[]).length;if(vgErf(f,v))e++;}));return{f:(r?.fenster||[]).length,g,m,e};};
  const isA=k=>(proj?.activeFields||[]).includes(k);
  const fFs=()=>Object.entries(FIELDS).filter(([k,d])=>d.g==="f"&&d.t!=="zustand"&&d.t!=="geo"&&d.t!=="masse"&&isA(k));
  const vFs=()=>Object.entries(FIELDS).filter(([k,d])=>d.g==="v"&&isA(k));
  const hasZ=()=>proj?.zustandModus&&proj.zustandModus!=="Keine"&&isA("zustandRahmen");
  const getDef=(k,fenRec,vgRec)=>resolveDef(k,fenRec,vgRec,proj);

  if(loading)return <div style={{...$.app,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><span style={{color:C.tx2}}>Laden...</span></div>;
  const Toast=toast?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.sf2,color:C.tx,padding:"9px 18px",borderRadius:8,fontSize:14,fontWeight:600,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",border:`1px solid ${C.bd}`}}>{toast}</div>:null;

  // HOME
  if(view==="home")return <div style={$.app}><div style={$.hdr}><div style={{flex:1}}><div style={{fontSize:19,fontWeight:800}}>🔍 FensterCheck</div><div style={{fontSize:10,color:C.tx2,letterSpacing:"0.5px"}}>FENSTER-MESSERFASSUNG</div></div><button style={$.hdrB} onClick={()=>setView("settings")}>⚙ Einstellungen</button></div><div style={$.body}>
    {projects.length>0&&projects.map(p=>{const s=pSt(p);return <div key={p.id} style={$.li} onClick={()=>{setProj(p);setView("survey");}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,marginBottom:2}}>{p.name||"Unbenannt"}</div><div style={{fontSize:12,color:C.tx2}}>{p.gebaeude||"—"} · {s.rooms}R · {s.m}M</div></div><div style={{display:"flex",gap:6,alignItems:"center"}}><button style={{...$.btn,...$.bO,...$.bS,padding:"5px 8px"}} onClick={e=>{e.stopPropagation();setProj(p);setView("setup");}}>⚙</button><span style={{color:C.tx3}}>›</span></div></div>;})}
    <button style={{...$.btn,...$.bP,...$.bBl,marginTop:16}} onClick={createProj}>+ Neues Projekt</button>
    <label style={{...$.btn,...$.bO,...$.bBl,marginTop:8,cursor:"pointer"}}>
      📂 Projekt importieren (JSON)
      <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>impJSON(ev.target.result,false);r.readAsText(f);e.target.value="";}}/>
    </label>
  </div>{Toast}</div>;

  // GLOBALE EINSTELLUNGEN
  if(view==="settings")return <div style={$.app}><div style={$.hdr}><button style={$.hdrB} onClick={()=>setView("home")}>← Zurück</button><div style={$.hdrT}>Einstellungen</div></div><div style={$.body}>
    <div style={$.card}><div style={$.cardT}>Standardwerte (Thermisch) – Global</div>
      <div style={{fontSize:11,color:C.tx2,marginBottom:10}}>Referenzwerte zur Vorbelegung von Uf, Ug, g und ψ – frei anpassbar, keine Gewähr. Gelten für alle Projekte; einzelne Projekte können sie in der Einrichtung überschreiben.</div>
      <ThermalEditor tables={globalTD} onChange={t=>{saveGlobalTD(t);setGlobalTD(t);}}/>
      <button style={{...$.btn,...$.bO,...$.bS,marginTop:12}} onClick={()=>{if(confirm("Alle thermischen Standardwerte auf Werkseinstellung zurücksetzen?")){const t=JSON.parse(JSON.stringify(DEFAULT_TABLES));saveGlobalTD(t);setGlobalTD(t);flash("Zurückgesetzt");}}}>Auf Standardwerte zurücksetzen</button>
    </div>
  </div>{Toast}</div>;

  // SETUP
  if(view==="setup"){const p=proj;const af=new Set(p.activeFields||[]);const defs=p.defaults||{};
    const togF=k=>{const n=new Set(af);if(n.has(k))n.delete(k);else n.add(k);setProj({...p,activeFields:[...n]});};
    const setDef=(k,v)=>{const nd={...defs,[k]:v};setProj({...p,defaults:nd});};
    const trySetModus=(m)=>{
      if(m===p.modus)return;
      if(hasData(p)){flash("⚠ Moduswechsel bei vorhandenen Daten nicht möglich. Neues Projekt erstellen.");return;}
      setProj({...p,modus:m});
    };
  return <div style={$.app}><div style={$.hdr}><button style={$.hdrB} onClick={()=>setView(p.rooms?.length?"survey":"home")}>← Zurück</button><div style={$.hdrT}>Einrichtung</div><button style={$.hdrB} onClick={()=>{save(p);setView("survey");flash("✓");}}>Fertig</button></div><div style={$.body}>
    <div style={$.card}><div style={$.cardT}>Projekt</div><div style={{marginBottom:8}}><label style={$.lbl}>Name</label><input style={$.inp} value={p.name||""} onChange={e=>setProj({...p,name:e.target.value})} placeholder="Projektname"/></div><div style={{marginBottom:8}}><label style={$.lbl}>Gebäude</label><input style={$.inp} value={p.gebaeude||""} onChange={e=>setProj({...p,gebaeude:e.target.value})}/></div><div><label style={$.lbl}>Adresse</label><input style={$.inp} value={p.adresse||""} onChange={e=>setProj({...p,adresse:e.target.value})}/></div></div>
    <div style={$.card}><div style={$.cardT}>Begehung</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:2}}><label style={$.lbl}>Begeher/in</label><input style={$.inp} value={p.begeher||""} onChange={e=>setProj({...p,begeher:e.target.value})} placeholder="Name"/></div>
        <div style={{flex:1.2}}><label style={$.lbl}>Datum</label><input style={$.inp} type="date" value={p.begehungsdatum||""} onChange={e=>setProj({...p,begehungsdatum:e.target.value})}/></div>
      </div>
      <div style={{marginBottom:8}}><label style={$.lbl}>Witterung</label><input style={$.inp} value={p.witterung||""} onChange={e=>setProj({...p,witterung:e.target.value})} placeholder="z.B. bedeckt, trocken"/></div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}><label style={$.lbl}>Temp. außen [°C]</label><input style={$.inp} type="number" step="0.5" value={p.tempAussen||""} onChange={e=>setProj({...p,tempAussen:e.target.value})}/></div>
        <div style={{flex:1}}><label style={$.lbl}>Temp. innen [°C]</label><input style={$.inp} type="number" step="0.5" value={p.tempInnen||""} onChange={e=>setProj({...p,tempInnen:e.target.value})}/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={$.lbl}>Feuchte außen [%rF]</label><input style={$.inp} type="number" value={p.feuchteAussen||""} onChange={e=>setProj({...p,feuchteAussen:e.target.value})}/></div>
        <div style={{flex:1}}><label style={$.lbl}>Feuchte innen [%rF]</label><input style={$.inp} type="number" value={p.feuchteInnen||""} onChange={e=>setProj({...p,feuchteInnen:e.target.value})}/></div>
      </div>

    {/* Add button */}
    {isV?<button style={{...$.btn,...$.bP,...$.bBl,marginTop:8}} onClick={()=>{addFen(rm.id);flash("Verglasung +");}}>+ Verglasung hinzufügen</button>
    :<button style={{...$.btn,...$.bP,...$.bBl,marginTop:8}} onClick={()=>{setFmF({nr:`F${(rm.fenster?.length||0)+1}`,va:2});setModal("addF");}}>+ Fenster hinzufügen</button>}
  </div>
    {modal==="addF"&&<div style={$.modal} onClick={()=>setModal(null)}><div style={$.modalC} onClick={e=>e.stopPropagation()}><div style={$.modalH}/><div style={{fontWeight:800,fontSize:16,marginBottom:14}}>Fenster hinzufügen</div><div style={{marginBottom:8}}><label style={$.lbl}>Fenster-Nr.</label><input style={$.inp} value={fmF.nr} onChange={e=>setFmF({...fmF,nr:e.target.value})} autoFocus/></div><div style={{marginBottom:14}}><label style={$.lbl}>Verglasungen</label><div style={{display:"flex",gap:4}}>{[1,2,3,4,5,6].map(n=><button key={n} style={{...$.btn,flex:1,...(fmF.va===n?$.bP:$.bO)}} onClick={()=>setFmF({...fmF,va:n})}>{n}</button>)}</div></div><button style={{...$.btn,...$.bP,...$.bBl}} onClick={()=>{addFen(rm.id,fmF.nr,fmF.va);setModal(null);flash("Fenster +");}}>Hinzufügen</button></div></div>}
  {Toast}</div>;}

  // MEASURE
  if(view==="measure"){const p=proj;const rm=p.rooms.find(r=>r.id===room?.id);const f=rm?.fenster?.find(x=>x.id===fen?.id);const v=f?.verglasungen?.find(x=>x.id===vg?.id);
    if(!rm||!f||!v){setView("room");return null;}
    const isV=p.modus==="verglasung";const label=isV?f.nr:`${f.nr} · Verglasung ${v.nr}`;const vf=vFs();
    let all=[];rm.fenster.forEach(x=>x.verglasungen.forEach(y=>all.push({f:x,v:y})));const idx=all.findIndex(x=>x.v.id===v.id);const tot=all.length;const msd=all.filter(x=>vgErf(x.f,x.v)).length;
    const go=i=>{setFen(all[i].f);setVg(all[i].v);setNumVal("");};
    const navTo=(i)=>guardNav(()=>go(i));
    const navBack=()=>guardNav(()=>setView("room"));
    const navRoom=()=>guardNav(()=>{setNumVal("");setView("room");});

    // Add extra verglasung and navigate to it
    const addAndGoExtra=()=>{
      addExtraVg(rm.id);
      // Need to navigate to the new one after state update
      setTimeout(()=>{
        const updated=JSON.parse(JSON.stringify(proj));const ur=gR(updated,rm.id);
        if(ur){const lastF=ur.fenster[ur.fenster.length-1];if(lastF){setFen(lastF);setVg(lastF.verglasungen[0]);setNumVal("");}}
      },100);
      flash("Weitere Verglasung +");
    };

  return <div style={$.app}><div style={$.hdr}><button style={$.hdrB} onClick={navBack}>← Raum</button><div style={$.hdrT}>{rm.raumnummer} · {label}</div></div><div style={$.body}>
    <div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.tx2,marginBottom:3}}><span>Verglasung {idx+1}/{tot}</span><span>{msd}/{tot} erfasst</span></div><div style={$.prog}><div style={$.progF(tot>0?(msd/tot)*100:0)}/></div></div>
    {vf.length>0&&<div style={$.card}><div style={$.cardT}>Verglasung</div>{vf.map(([k,d])=><FldInp key={k} k={k} def={d} value={v.data?.[k]||""} source={v.sources?.[k]||""} onVal={val=>setFV(rm.id,f.id,v.id,k,val)} onSrc={s=>setFS(rm.id,f.id,v.id,k,s)} defaultVal={getDef(k,f,v)} showSrc={proj?.showSrc}/>)}</div>}
    {isA("stempel")&&<div style={$.card}><div style={$.cardT}>Glasstempel</div><input style={{...$.inp,...$.inpS}} value={v.data?.stempel||""} onChange={e=>setFV(rm.id,f.id,v.id,"stempel",e.target.value)} placeholder="Herstellerangaben"/><div style={{marginTop:6}}><Photos label="Stempel-Foto" photos={(v.photos||[]).filter(p=>p.isStempel)} onAdd={ph=>addPh(rm.id,f.id,v.id,{...ph,isStempel:true})} onDel={pid=>delPh(rm.id,f.id,v.id,pid)}/></div></div>}
    <div style={$.card}><Photos label="Verglasung-Fotos" photos={(v.photos||[]).filter(p=>!p.isStempel)} onAdd={ph=>addPh(rm.id,f.id,v.id,ph)} onDel={pid=>delPh(rm.id,f.id,v.id,pid)}/></div>
    <div style={$.card}><div onClick={()=>setShowGas(g=>!g)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}><div style={{...$.cardT,marginBottom:0}}>Gasfüllgrad <span style={{color:C.tx3,fontWeight:400,letterSpacing:0,textTransform:"none"}}>· optional</span></div><div style={{display:"flex",alignItems:"center",gap:8}}>{(v.messungen?.length||0)>0&&<span style={{fontFamily:"monospace",color:C.ac,fontWeight:700,fontSize:15}}>{v.messungen[v.messungen.length-1].wert}%</span>}<span style={{fontSize:12,color:C.tx3,transition:"transform 0.2s",transform:showGas?"rotate(0deg)":"rotate(-90deg)"}}>▼</span></div></div>{showGas&&<div style={{marginTop:12}}><NumPad value={numVal} onChange={setNumVal} onSubmit={val=>addMs(rm.id,f.id,v.id,val)}/>{(v.messungen?.length||0)>0&&<div style={{marginTop:10}}><div style={$.cardT}>Messungen ({v.messungen.length})</div>{v.messungen.map((m,mi)=><div key={mi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:mi<v.messungen.length-1?`1px solid ${C.bd}`:"none"}}><div><span style={{fontFamily:"monospace",fontWeight:800,fontSize:16}}>{m.wert}%</span><span style={{fontSize:10,color:C.tx2,marginLeft:8}}>{new Date(m.zeit).toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span></div><button style={{background:"none",border:"none",color:C.err,cursor:"pointer",fontSize:16,padding:4}} onClick={()=>delMs(rm.id,f.id,v.id,mi)}>×</button></div>)}</div>}</div>}</div>
    {/* Navigation */}
    <div style={{display:"flex",gap:6,marginTop:8}}>
      {idx>0&&<button style={{...$.btn,...$.bO,flex:1}} onClick={()=>navTo(idx-1)}>← Vorherige</button>}
      {idx<tot-1?<button style={{...$.btn,...$.bP,flex:1}} onClick={()=>navTo(idx+1)}>Nächste →</button>
      :<button style={{...$.btn,...$.bOk,flex:1}} onClick={navRoom}>✓ Raum fertig</button>}
    </div>
    {/* Add extra verglasung */}
    {isV&&<button style={{...$.btn,...$.bO,...$.bBl,marginTop:8}} onClick={addAndGoExtra}>+ Weitere Verglasung</button>}
  </div>
  {/* Confirm dialog for unsaved data */}
  {confirmNav&&<ConfirmDialog message="Es gibt einen nicht gespeicherten Messwert im Numpad. Ohne Speichern fortfahren?" onYes={()=>{setNumVal("");confirmNav.action();setConfirmNav(null);}} onNo={()=>setConfirmNav(null)}/>}
  {Toast}</div>;}

  return null;
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
